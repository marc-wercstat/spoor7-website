<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Spoor 7 — Even offline</title>
  <style>
    :root { --gold: #d4a537; --bg: #0d0d0d; --fg: #f2f2f2; --muted: #a8a8a8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(120% 90% at 50% 0%, #1a1a1a 0%, var(--bg) 60%);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100%; padding: 2rem; text-align: center;
    }
    .card { max-width: 34rem; }
    img.logo { width: min(240px, 60vw); height: auto; margin-bottom: 2rem; }
    h1 {
      text-transform: uppercase; letter-spacing: .04em;
      font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 700;
      line-height: 1.1; margin-bottom: 1rem;
    }
    h1 .accent { color: var(--gold); }
    p { color: var(--muted); font-size: 1.05rem; line-height: 1.6; margin-bottom: .75rem; }
    a { color: var(--gold); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .rule { width: 3rem; height: 3px; background: var(--gold); margin: 1.75rem auto; border: 0; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/img/spoor7_logo_white_1.svg" alt="Spoor 7">
    <h1>Even <span class="accent">offline</span></h1>
    <hr class="rule">
    <p>Onze website is tijdelijk in onderhoud. We zijn snel weer terug.</p>
    <p>Boeking of vraag? Mail ons op<br>
      <a href="mailto:info@spoor7coverband.nl">info@spoor7coverband.nl</a>
    </p>
  </main>
</body>
</html>
